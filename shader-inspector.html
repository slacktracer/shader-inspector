<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLSL Pixel Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161625;
    --border: #252538;
    --accent: #e8a020;
    --accent2: #30b8f0;
    --green: #40e080;
    --red: #f04050;
    --text: #c8c8dc;
    --muted: #5a5a78;
    --dim: #888899;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
    --ui-fs: 12.5px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  #app {
    display: grid;
    grid-template-rows: 44px 1fr;
    grid-template-columns: 1fr auto;
    height: 100vh;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 1.04);
    color: var(--accent);
    letter-spacing: 0.05em;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '◈';
    font-size: calc(var(--ui-fs) * 1.28);
  }
  .header-sep { flex: 1; }
  .example-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
  }
  .example-select:hover { border-color: var(--accent); }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #ffc040; }
  .btn.active { border-color: var(--green); color: var(--green); }
  #render-time { font-family: var(--mono); font-size: calc(var(--ui-fs) * 0.88); color: var(--muted); min-width: 70px; text-align: right; }
  .font-btn { padding: 5px 8px; min-width: 30px; justify-content: center; }
  #resolution-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
  }

  /* ── EDITOR ── */
  #editor-panel {
    grid-row: 2;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .panel-label {
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.8);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #shader-code {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: #a0e0c0;
    font-family: var(--mono);
    font-size: var(--ui-fs);
    line-height: 1.7;
    border: none;
    outline: none;
    padding: 14px 16px;
    overflow-y: auto;
    tab-size: 2;
    caret-color: var(--accent);
  }
  .error-bar {
    background: rgba(240, 64, 80, 0.12);
    border-top: 1px solid rgba(240, 64, 80, 0.4);
    color: var(--red);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 6px 14px;
    min-height: 32px;
    display: none;
  }
  .error-bar.visible { display: block; }

  /* ── RIGHT PANE ── */
  #right-pane {
    grid-row: 2;
    grid-column: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    width: 320px;
    min-width: 220px;
    flex-shrink: 0;
    position: relative;
  }
  #right-pane.wide {
    flex-direction: row;
  }
  #right-resize-handle {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    cursor: col-resize;
    z-index: 20;
    background: transparent;
    transition: background 0.15s;
  }
  #right-resize-handle:hover, #right-resize-handle.dragging {
    background: rgba(232, 160, 32, 0.4);
  }

  /* ── CANVAS PANEL ── */
  #canvas-panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  #right-pane.wide #canvas-panel {
    border-bottom: none;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  #canvas-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(45deg, #111118 0px, #111118 4px, transparent 4px, transparent 8px),
      repeating-linear-gradient(-45deg, #111118 0px, #111118 4px, transparent 4px, transparent 8px);
    background-color: #0a0a12;
    padding: 8px;
  }
  /* in wide/row mode, canvas-wrap must fill the panel height */
  #right-pane.wide #canvas-wrap {
    flex: 1;
    padding: 8px;
  }
  #canvas {
    cursor: crosshair;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid var(--border);
    max-width: 100%;
    max-height: 100%;
    outline: none;
  }
  #canvas:focus {
    border-color: var(--accent);
  }
  #crosshair {
    position: absolute;
    pointer-events: none;
    display: none;
  }
  #crosshair .ch-h, #crosshair .ch-v {
    position: absolute;
    background: rgba(248, 160, 32, 0.7);
  }
  #crosshair .ch-h { height: 1px; width: 100vw; top: 50%; left: -500px; transform: translateY(-50%); }
  #crosshair .ch-v { width: 1px; height: 100vh; left: 50%; top: -500px; transform: translateX(-50%); }

  /* ── INSPECTOR ── */
  #inspector-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-width: 200px;
  }
  #inspector-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    line-height: 1.6;
  }
  .insp-empty {
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
    font-family: var(--sans);
    font-size: calc(var(--ui-fs) * 0.96);
  }
  .insp-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .insp-label {
    color: var(--accent);
    min-width: 110px;
    flex-shrink: 0;
  }
  .insp-value { color: var(--accent2); }
  .insp-value.vec { color: #90d8a0; }
  .insp-value.float { color: #f0d080; }
  .insp-value.color-swatch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
    display: inline-block;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .insp-section {
    color: var(--muted);
    font-size: calc(var(--ui-fs) * 0.8);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 8px 0 4px;
  }
  .insp-debug { color: #c080f0; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">GLSL Pixel Inspector</div>
    <select class="example-select" id="example-select">
      <option value="">— load example —</option>
      <option value="uv">UV Coordinates</option>
      <option value="circle">SDF Circle</option>
      <option value="stripes">Stripes & Smoothstep</option>
      <option value="plasma">Plasma Wave</option>
      <option value="checkerboard">Checkerboard</option>
      <option value="gradient">Radial Gradient</option>
      <option value="normals">Normal Map Look</option>
    </select>
    <div class="header-sep"></div>
    <select id="resolution-select">
      <option value="64">64 × 64</option>
      <option value="128" selected>128 × 128</option>
      <option value="256">256 × 256</option>
    </select>
    <button class="btn font-btn" id="font-dec" title="Decrease font size">A−</button>
    <button class="btn font-btn" id="font-inc" title="Increase font size">A+</button>
    <button class="btn" id="anim-btn">▶ Animate</button>
    <button class="btn primary" id="run-btn">⌘ Run</button>
    <div id="render-time">—</div>
  </header>

  <div id="editor-panel">
    <div class="panel-label">Fragment Shader · JavaScript / GLSL-like</div>
    <textarea id="shader-code" spellcheck="false"></textarea>
    <div class="error-bar" id="error-bar"></div>
  </div>

  <div id="right-pane">
    <div id="right-resize-handle"></div>

    <div id="canvas-panel">
      <div class="panel-label" id="canvas-label">Preview · 128 × 128</div>
      <div id="canvas-wrap">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
      </div>
    </div>

    <div id="inspector-panel">
      <div class="panel-label">Pixel Inspector · click any pixel</div>
      <div id="inspector-content">
        <div class="insp-empty">Click a pixel to inspect its values.</div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//   GLSL RUNTIME — types & builtins
// ═══════════════════════════════════════════

function _v2(x, y)       { return { x, y, r:x, g:y,     type:'vec2' }; }
function _v3(x, y, z)    { return { x, y, z, r:x, g:y, b:z, type:'vec3' }; }
function _v4(x, y, z, w) { return { x, y, z, w, r:x, g:y, b:z, a:w, type:'vec4' }; }

function vec2(a, b) {
  if (b === undefined) return _v2(+a, +a);
  return _v2(+a, +b);
}
function vec3(a, b, c) {
  if (b === undefined) return _v3(+a, +a, +a);
  if (c === undefined) { // vec3(vec2, float)
    if (a && a.type === 'vec2') return _v3(a.x, a.y, +b);
    return _v3(+a, +b, +b);
  }
  return _v3(+a, +b, +c);
}
function vec4(a, b, c, d) {
  if (b === undefined) return _v4(+a, +a, +a, +a);
  if (d === undefined) {
    if (a && a.type === 'vec3') return _v4(a.x, a.y, a.z, +b);
    if (a && a.type === 'vec2' && b && b.type === 'vec2') return _v4(a.x, a.y, b.x, b.y);
    return _v4(+a, +b, +c ?? +b, +b);
  }
  return _v4(+a, +b, +c, +d);
}

// Swizzle helper (read common combos)
function sw(v, s) {
  const map = { x:v.x, y:v.y, z:v.z||0, w:v.w||0, r:v.r, g:v.g, b:v.b||0, a:v.a||0 };
  if (s.length === 2) return vec2(map[s[0]], map[s[1]]);
  if (s.length === 3) return vec3(map[s[0]], map[s[1]], map[s[2]]);
  if (s.length === 4) return vec4(map[s[0]], map[s[1]], map[s[2]], map[s[3]]);
  return map[s];
}

// Component-wise operations
function _applyOp(a, b, op) {
  const scalar = typeof b === 'number';
  if (a.type === 'vec2') return vec2(op(a.x, scalar ? b : b.x), op(a.y, scalar ? b : b.y));
  if (a.type === 'vec3') return vec3(op(a.x, scalar ? b : b.x), op(a.y, scalar ? b : b.y), op(a.z, scalar ? b : b.z));
  if (a.type === 'vec4') return vec4(op(a.x, scalar ? b : b.x), op(a.y, scalar ? b : b.y), op(a.z, scalar ? b : b.z), op(a.w, scalar ? b : b.w));
  return op(a, b);
}

function vadd(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return a + b;
  if (typeof a === 'number') return _applyOp(b, a, (x, y) => x + y);
  return _applyOp(a, b, (x, y) => x + y);
}
function vsub(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return a - b;
  return _applyOp(a, b, (x, y) => x - y);
}
function vmul(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return a * b;
  if (typeof a === 'number') return _applyOp(b, a, (x, y) => x * y);
  return _applyOp(a, b, (x, y) => x * y);
}
function vdiv(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return a / b;
  return _applyOp(a, b, (x, y) => x / y);
}
function vneg(a) {
  if (typeof a === 'number') return -a;
  if (a.type === 'vec2') return vec2(-a.x, -a.y);
  if (a.type === 'vec3') return vec3(-a.x, -a.y, -a.z);
  if (a.type === 'vec4') return vec4(-a.x, -a.y, -a.z, -a.w);
}

// GLSL built-in math
function _s(fn) {
  return (v, ...rest) => {
    if (typeof v === 'number') return fn(v, ...rest);
    return _applyOp(v, rest[0] ?? 0, (x) => fn(x, ...rest));
  };
}

function sin(v)  { return typeof v==='number' ? Math.sin(v)  : _applyOp(v,0,(x)=>Math.sin(x)); }
function cos(v)  { return typeof v==='number' ? Math.cos(v)  : _applyOp(v,0,(x)=>Math.cos(x)); }
function tan(v)  { return typeof v==='number' ? Math.tan(v)  : _applyOp(v,0,(x)=>Math.tan(x)); }
function sqrt(v) { return typeof v==='number' ? Math.sqrt(v) : _applyOp(v,0,(x)=>Math.sqrt(x)); }
function abs(v)  { return typeof v==='number' ? Math.abs(v)  : _applyOp(v,0,(x)=>Math.abs(x)); }
function floor(v){ return typeof v==='number' ? Math.floor(v): _applyOp(v,0,(x)=>Math.floor(x)); }
function ceil(v) { return typeof v==='number' ? Math.ceil(v) : _applyOp(v,0,(x)=>Math.ceil(x)); }
function sign(v) { return typeof v==='number' ? Math.sign(v) : _applyOp(v,0,(x)=>Math.sign(x)); }
function exp(v)  { return typeof v==='number' ? Math.exp(v)  : _applyOp(v,0,(x)=>Math.exp(x)); }
function log(v)  { return typeof v==='number' ? Math.log(v)  : _applyOp(v,0,(x)=>Math.log(x)); }
function atan(y, x) {
  if (x === undefined) return typeof y === 'number' ? Math.atan(y) : _applyOp(y,0,(v)=>Math.atan(v));
  return typeof y === 'number' ? Math.atan2(y, x) : _applyOp(y,x,(a,b)=>Math.atan2(a,b));
}
function pow(a, b) {
  if (typeof a === 'number') return Math.pow(a, b);
  return _applyOp(a, b, (x, y) => Math.pow(x, y));
}
function mod(a, b) {
  if (typeof a === 'number') return a - b * Math.floor(a / b);
  return _applyOp(a, b, (x, y) => x - y * Math.floor(x / y));
}
function fract(v) {
  if (typeof v === 'number') return v - Math.floor(v);
  return _applyOp(v, 0, (x) => x - Math.floor(x));
}
function clamp(v, lo, hi) {
  if (typeof v === 'number') return Math.max(lo, Math.min(hi, v));
  return _applyOp(v, 0, (x) => Math.max(lo, Math.min(hi, x)));
}
function mix(a, b, t) {
  if (typeof a === 'number') return a + (b - a) * t;
  const scalar = typeof t === 'number';
  if (a.type === 'vec2') return vec2(mix(a.x,b.x,scalar?t:t.x), mix(a.y,b.y,scalar?t:t.y));
  if (a.type === 'vec3') return vec3(mix(a.x,b.x,scalar?t:t.x), mix(a.y,b.y,scalar?t:t.y), mix(a.z,b.z,scalar?t:t.z));
  if (a.type === 'vec4') return vec4(mix(a.x,b.x,scalar?t:t.x), mix(a.y,b.y,scalar?t:t.y), mix(a.z,b.z,scalar?t:t.z), mix(a.w,b.w,scalar?t:t.w));
}
function step(edge, v) {
  if (typeof v === 'number') return v < edge ? 0.0 : 1.0;
  return _applyOp(v, 0, (x) => x < edge ? 0.0 : 1.0);
}
function smoothstep(lo, hi, v) {
  if (typeof v === 'number') {
    const t = clamp((v - lo) / (hi - lo), 0, 1);
    return t * t * (3 - 2 * t);
  }
  return _applyOp(v, 0, (x) => smoothstep(lo, hi, x));
}
function length(v) {
  if (typeof v === 'number') return Math.abs(v);
  if (v.type === 'vec2') return Math.sqrt(v.x*v.x + v.y*v.y);
  if (v.type === 'vec3') return Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z);
  if (v.type === 'vec4') return Math.sqrt(v.x*v.x + v.y*v.y + v.z*v.z + v.w*v.w);
}
function normalize(v) {
  const len = length(v);
  if (len === 0) return v;
  return vdiv(v, len);
}
function dot(a, b) {
  if (a.type === 'vec2') return a.x*b.x + a.y*b.y;
  if (a.type === 'vec3') return a.x*b.x + a.y*b.y + a.z*b.z;
  if (a.type === 'vec4') return a.x*b.x + a.y*b.y + a.z*b.z + a.w*b.w;
}
function cross(a, b) {
  return vec3(a.y*b.z - a.z*b.y, a.z*b.x - a.x*b.z, a.x*b.y - a.y*b.x);
}
function reflect(i, n) { return vsub(i, vmul(n, 2.0 * dot(n, i))); }
function distance(a, b) { return length(vsub(a, b)); }
function max(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return Math.max(a, b);
  if (typeof a === 'number') return _applyOp(b, a, (x, y) => Math.max(x, y));
  if (typeof b === 'number') return _applyOp(a, b, (x, y) => Math.max(x, y));
  return _applyOp(a, b, (x, y) => Math.max(x, y));
}
function min(a, b) {
  if (typeof a === 'number' && typeof b === 'number') return Math.min(a, b);
  if (typeof a === 'number') return _applyOp(b, a, (x, y) => Math.min(x, y));
  if (typeof b === 'number') return _applyOp(a, b, (x, y) => Math.min(x, y));
  return _applyOp(a, b, (x, y) => Math.min(x, y));
}
const PI = Math.PI;
const TAU = Math.PI * 2;

// ═══════════════════════════════════════════
//   FORMAT HELPERS
// ═══════════════════════════════════════════

function fmt(v, digits=4) {
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'number') return v.toFixed(digits);
  if (v.type === 'vec2') return `vec2(${fmt(v.x)}, ${fmt(v.y)})`;
  if (v.type === 'vec3') return `vec3(${fmt(v.x)}, ${fmt(v.y)}, ${fmt(v.z)})`;
  if (v.type === 'vec4') return `vec4(${fmt(v.x)}, ${fmt(v.y)}, ${fmt(v.z)}, ${fmt(v.w)})`;
  return JSON.stringify(v);
}

function toHex(r,g,b) {
  const c = (v) => Math.round(clamp(v,0,1)*255).toString(16).padStart(2,'0');
  return `#${c(r)}${c(g)}${c(b)}`;
}

// ═══════════════════════════════════════════
//   SHADER RUNNER
// ═══════════════════════════════════════════

let RES = 128;
let animating = false;
let animFrame = null;
let startTime = performance.now();
let lastITime = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function setResolution(r) {
  RES = r;
  canvas.width = r;
  canvas.height = r;
  canvas.style.width  = Math.min(r * (r < 128 ? 4 : r < 256 ? 2 : 1), 260) + 'px';
  canvas.style.height = canvas.style.width;
  document.getElementById('canvas-label').textContent = `Preview · ${r} × ${r}`;
}
setResolution(RES);

function getShaderCode() {
  return document.getElementById('shader-code').value;
}

function compileShader(code) {
  // Wrap user code in function, expose all globals
  const wrapper = `
    "use strict";
    return function mainImage(fragCoord, iResolution, iTime, _debugLog) {
      function debug(label, value) { _debugLog(label, value); }
      ${code}
    };
  `;
  try {
    const factory = new Function(
      'vec2','vec3','vec4','sw',
      'vadd','vsub','vmul','vdiv','vneg',
      'sin','cos','tan','sqrt','abs','floor','ceil','sign','exp','log',
      'atan','pow','mod','fract','clamp','mix','step','smoothstep',
      'length','normalize','dot','cross','reflect','distance',
      'max','min','PI','TAU',
      wrapper
    );
    return {
      fn: factory(
        vec2,vec3,vec4,sw,
        vadd,vsub,vmul,vdiv,vneg,
        sin,cos,tan,sqrt,abs,floor,ceil,sign,exp,log,
        atan,pow,mod,fract,clamp,mix,step,smoothstep,
        length,normalize,dot,cross,reflect,distance,
        max,min,PI,TAU
      ),
      error: null
    };
  } catch(e) {
    return { fn: null, error: e.message };
  }
}

function renderShader(fn, iTime, inspectX, inspectY) {
  if (!fn) return null;
  const imageData = ctx.createImageData(RES, RES);
  const data = imageData.data;
  const iRes = vec2(RES, RES);
  let inspectLog = null;

  for (let py = 0; py < RES; py++) {
    for (let px = 0; px < RES; px++) {
      // GLSL convention: origin bottom-left
      const fragCoord = vec2(px + 0.5, (RES - 1 - py) + 0.5);
      let debugEntries = null;
      const debugLog = (label, value) => {
        if (debugEntries) debugEntries.push({ label, value });
      };

      const isInspect = (px === inspectX && py === inspectY);
      if (isInspect) debugEntries = [];

      let result;
      try {
        result = fn(fragCoord, iRes, iTime, debugLog);
      } catch(e) {
        result = vec4(1, 0, 0.5, 1); // error color
      }

      if (!result) result = vec4(0, 0, 0, 1);
      const idx = (py * RES + px) * 4;
      data[idx]   = Math.round(clamp(result.r ?? result.x ?? 0, 0, 1) * 255);
      data[idx+1] = Math.round(clamp(result.g ?? result.y ?? 0, 0, 1) * 255);
      data[idx+2] = Math.round(clamp(result.b ?? result.z ?? 0, 0, 1) * 255);
      data[idx+3] = Math.round(clamp(result.a ?? result.w ?? 1, 0, 1) * 255);

      if (isInspect) {
        inspectLog = {
          fragCoord,
          iResolution: iRes,
          iTime,
          result,
          debug: debugEntries
        };
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);
  return inspectLog;
}

// ═══════════════════════════════════════════
//   INSPECTOR PANEL
// ═══════════════════════════════════════════

function updateInspector(log) {
  const panel = document.getElementById('inspector-content');
  if (!log) {
    panel.innerHTML = `<div class="insp-empty">Click a pixel to inspect its values.</div>`;
    return;
  }

  const { fragCoord, iResolution, iTime, result, debug } = log;
  const r = clamp(result.r ?? result.x ?? 0, 0, 1);
  const g = clamp(result.g ?? result.y ?? 0, 0, 1);
  const b = clamp(result.b ?? result.z ?? 0, 0, 1);
  const a = clamp(result.a ?? result.w ?? 1, 0, 1);
  const hex = toHex(r, g, b);

  let html = `
    <div class="insp-section">Uniforms</div>
    <div class="insp-row"><span class="insp-label">fragCoord</span><span class="insp-value vec">${fmt(fragCoord)}</span></div>
    <div class="insp-row"><span class="insp-label">iResolution</span><span class="insp-value vec">${fmt(iResolution)}</span></div>
    <div class="insp-row"><span class="insp-label">iTime</span><span class="insp-value float">${fmt(iTime)}</span></div>
    <div class="insp-section">Output</div>
    <div class="insp-row">
      <span class="insp-label">gl_FragColor</span>
      <span class="insp-value color-swatch">
        <span class="swatch" style="background:${hex}"></span>
        ${fmt(result)}
      </span>
    </div>
    <div class="insp-row"><span class="insp-label">hex</span><span class="insp-value">${hex}</span></div>
    <div class="insp-row"><span class="insp-label">r g b a</span><span class="insp-value float">${fmt(r,3)} &nbsp; ${fmt(g,3)} &nbsp; ${fmt(b,3)} &nbsp; ${fmt(a,3)}</span></div>
  `;

  if (debug && debug.length > 0) {
    html += `<div class="insp-section">Debug Calls</div>`;
    for (const entry of debug) {
      html += `<div class="insp-row"><span class="insp-label insp-debug">${entry.label}</span><span class="insp-value vec">${fmt(entry.value)}</span></div>`;
    }
  } else {
    html += `<div class="insp-row"><span style="color:var(--muted);font-size:11px">Use <span style="color:#c080f0">debug(label, value)</span> to log intermediate values</span></div>`;
  }

  panel.innerHTML = html;
}

// ═══════════════════════════════════════════
//   CONTROLS & EVENTS
// ═══════════════════════════════════════════

let compiledFn = null;
let lastInspect = null;
let inspectPixel = null;

function showError(msg) {
  const bar = document.getElementById('error-bar');
  if (msg) { bar.textContent = '⚠ ' + msg; bar.classList.add('visible'); }
  else { bar.classList.remove('visible'); }
}

function runShader() {
  const code = getShaderCode();
  const { fn, error } = compileShader(code);
  showError(error);
  if (!fn) return;
  compiledFn = fn;

  const iTime = animating ? (performance.now() - startTime) / 1000 : lastITime;
  const t0 = performance.now();
  const log = renderShader(fn, iTime, inspectPixel?.x, inspectPixel?.y);
  const elapsed = (performance.now() - t0).toFixed(1);
  document.getElementById('render-time').textContent = `${elapsed} ms`;

  if (log) updateInspector(log);
}

document.getElementById('run-btn').addEventListener('click', runShader);

document.getElementById('shader-code').addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); runShader(); }
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target;
    const s = el.selectionStart;
    el.value = el.value.slice(0, s) + '  ' + el.value.slice(el.selectionEnd);
    el.selectionStart = el.selectionEnd = s + 2;
  }
});

// Animation
const animBtn = document.getElementById('anim-btn');
function tick() {
  if (!animating) return;
  if (!compiledFn) return;
  const iTime = (performance.now() - startTime) / 1000;
  lastITime = iTime;
  const t0 = performance.now();
  const log = renderShader(compiledFn, iTime, inspectPixel?.x, inspectPixel?.y);
  const elapsed = (performance.now() - t0).toFixed(1);
  document.getElementById('render-time').textContent = `${elapsed} ms`;
  if (log && inspectPixel) updateInspector(log);
  animFrame = requestAnimationFrame(tick);
}

animBtn.addEventListener('click', () => {
  animating = !animating;
  if (animating) {
    startTime = performance.now() - lastITime * 1000;
    animBtn.classList.add('active');
    animBtn.textContent = '■ Stop';
    // compile first
    const { fn, error } = compileShader(getShaderCode());
    showError(error);
    if (fn) { compiledFn = fn; animFrame = requestAnimationFrame(tick); }
  } else {
    animBtn.classList.remove('active');
    animBtn.textContent = '▶ Animate';
    cancelAnimationFrame(animFrame);
  }
});

// Select pixel, update crosshair and inspector
function selectPixel(px, py) {
  inspectPixel = { x: px, y: py };

  const rect = canvas.getBoundingClientRect();
  const ch = document.getElementById('crosshair');
  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  const cx = (px + 0.5) / RES * rect.width;
  const cy = (py + 0.5) / RES * rect.height;
  ch.style.display = 'block';
  ch.style.left = (rect.left - wrapRect.left + cx) + 'px';
  ch.style.top  = (rect.top  - wrapRect.top  + cy) + 'px';

  if (compiledFn) {
    const iTime = animating ? (performance.now() - startTime) / 1000 : lastITime;
    const log = renderShader(compiledFn, iTime, px, py);
    updateInspector(log);
  }
}

// Canvas click → inspect pixel
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = RES / rect.width;
  const scaleY = RES / rect.height;
  const px = Math.floor((e.clientX - rect.left) * scaleX);
  const py = Math.floor((e.clientY - rect.top) * scaleY);
  if (px < 0 || px >= RES || py < 0 || py >= RES) return;
  canvas.focus();
  selectPixel(px, py);
});

// Arrow keys → move selected pixel (wrapping)
const ARROW_DELTA = { ArrowLeft: [-1,0], ArrowRight: [1,0], ArrowUp: [0,-1], ArrowDown: [0,1] };
canvas.addEventListener('keydown', (e) => {
  const delta = ARROW_DELTA[e.key];
  if (!delta) return;
  e.preventDefault();
  const cur = inspectPixel ?? { x: Math.floor(RES / 2), y: Math.floor(RES / 2) };
  const px = (cur.x + delta[0] + RES) % RES;
  const py = (cur.y + delta[1] + RES) % RES;
  selectPixel(px, py);
});

// Resolution
document.getElementById('resolution-select').addEventListener('change', (e) => {
  setResolution(parseInt(e.target.value));
  inspectPixel = null;
  document.getElementById('crosshair').style.display = 'none';
  runShader();
});

// Examples
const EXAMPLES = {
  uv: `// UV Coordinates — classic first shader
// fragCoord goes from (0,0) to (iResolution)
// We normalize it to 0.0 → 1.0

let uv = vdiv(fragCoord, iResolution);

debug("uv", uv);
debug("uv.x", uv.x);

// R=x, G=y, B=0, A=1
return vec4(uv.x, uv.y, 0.0, 1.0);`,

  circle: `// Signed Distance Function — Circle
// SDF returns: negative = inside, positive = outside

let uv = vdiv(fragCoord, iResolution);
let aspect = iResolution.x / iResolution.y;

// Center UV and fix aspect ratio
let p = vsub(uv, vec2(0.5));
p = vec2(p.x * aspect, p.y);

debug("centered p", p);

// Circle SDF: d < 0 means we're inside
let d = length(p) - 0.3;

debug("SDF distance d", d);

// Smooth edge with smoothstep
let edge = smoothstep(0.01, -0.01, d);

debug("edge value", edge);

let col = mix(
  vec3(0.05, 0.05, 0.1),   // background
  vec3(0.2, 0.7, 1.0),     // circle color
  edge
);

return vec4(col.x, col.y, col.z, 1.0);`,

  stripes: `// Stripes & Smoothstep
// Shows how smoothstep creates anti-aliased edges

let uv = vdiv(fragCoord, iResolution);

// Create repeating pattern
let stripes = mod(uv.x * 10.0, 1.0);

debug("raw stripe value", stripes);

// Hard edge (aliased)
//let mask = step(0.5, stripes);

// Soft edge (anti-aliased)
let mask = smoothstep(0.45, 0.55, stripes);

debug("smoothstep mask", mask);

let col = mix(
  vec3(0.05, 0.05, 0.15),
  vec3(0.9, 0.5, 0.1),
  mask
);

return vec4(col.x, col.y, col.z, 1.0);`,

  plasma: `// Plasma Wave — iTime animation
// Try pressing ▶ Animate!

let uv = vdiv(fragCoord, iResolution);
let aspect = iResolution.x / iResolution.y;
let p = vec2(uv.x * aspect, uv.y);

debug("uv", uv);

let v1 = sin(p.x * 10.0 + iTime);
let v2 = sin(p.y * 10.0 + iTime * 0.7);
let v3 = sin((p.x + p.y) * 8.0 + iTime * 1.3);
let v4 = sin(length(vsub(p, vec2(0.5, 0.5))) * 12.0 - iTime * 2.0);

let plasma = (v1 + v2 + v3 + v4) / 4.0;

debug("plasma value", plasma);

// Map -1..1 to colors
let r = sin(plasma * PI + 0.0) * 0.5 + 0.5;
let g = sin(plasma * PI + 2.094) * 0.5 + 0.5;
let b = sin(plasma * PI + 4.189) * 0.5 + 0.5;

return vec4(r, g, b, 1.0);`,

  checkerboard: `// Checkerboard — mod and floor
// Classic way to create grid patterns

let uv = vdiv(fragCoord, iResolution);

let cells = 8.0;
let gridUV = vmul(uv, cells);

debug("gridUV", gridUV);

// mod 2 then floor gives alternating 0/1
let checker = mod(
  floor(gridUV.x) + floor(gridUV.y),
  2.0
);

debug("checker value", checker);

let col = mix(
  vec3(0.08, 0.08, 0.12),
  vec3(0.85, 0.85, 0.9),
  checker
);

return vec4(col.x, col.y, col.z, 1.0);`,

  gradient: `// Radial Gradient + vignette

let uv = vdiv(fragCoord, iResolution);
let aspect = iResolution.x / iResolution.y;

// Distance from center
let center = vec2(0.5, 0.5);
let p = vsub(uv, center);
p = vec2(p.x * aspect, p.y);
let dist = length(p);

debug("dist from center", dist);

// Radial gradient
let t = smoothstep(0.6, 0.0, dist);

debug("radial t", t);

// Color bands
let innerCol = vec3(0.9, 0.4, 0.1);
let outerCol = vec3(0.05, 0.03, 0.1);
let col = mix(outerCol, innerCol, t);

// Vignette
let vignette = smoothstep(0.7, 0.2, dist);
col = vmul(col, vignette);

return vec4(col.x, col.y, col.z, 1.0);`,

  normals: `// Normal Map Visualization
// Encodes gradient directions as colors (like normal maps)

let uv = vdiv(fragCoord, iResolution);
let aspect = iResolution.x / iResolution.y;
let p = vec2((uv.x - 0.5) * aspect, uv.y - 0.5);

// A bumpy height field
let h = sin(p.x * 12.0) * sin(p.y * 12.0) * 0.5 + 0.5;

// Approximate gradient (partial derivatives)
let eps = 0.01;
let hx = sin((p.x + eps) * 12.0) * sin(p.y * 12.0) * 0.5 + 0.5;
let hy = sin(p.x * 12.0) * sin((p.y + eps) * 12.0) * 0.5 + 0.5;
let dhdx = (hx - h) / eps;
let dhdy = (hy - h) / eps;

debug("height h", h);
debug("gradient", vec2(dhdx, dhdy));

// Normal from gradient (encode -1..1 → 0..1)
let nx = dhdx * 0.5 + 0.5;
let ny = dhdy * 0.5 + 0.5;
let nz = 1.0; // pointing "up"

return vec4(nx, ny, clamp(nz, 0.0, 1.0), 1.0);`
};

document.getElementById('example-select').addEventListener('change', (e) => {
  const key = e.target.value;
  if (key && EXAMPLES[key]) {
    document.getElementById('shader-code').value = EXAMPLES[key];
    runShader();
  }
  e.target.value = '';
});

// ═══════════════════════════════════════════
//   FONT SIZE
// ═══════════════════════════════════════════

let fontSize = parseFloat(localStorage.getItem('ui-fs') ?? '12.5');
const FONT_MIN = 8, FONT_MAX = 24, FONT_STEP = 1.5;

function applyFontSize() {
  document.documentElement.style.setProperty('--ui-fs', fontSize + 'px');
  localStorage.setItem('ui-fs', fontSize);
}
document.getElementById('font-inc').addEventListener('click', () => {
  fontSize = Math.min(FONT_MAX, fontSize + FONT_STEP);
  applyFontSize();
});
document.getElementById('font-dec').addEventListener('click', () => {
  fontSize = Math.max(FONT_MIN, fontSize - FONT_STEP);
  applyFontSize();
});

// ═══════════════════════════════════════════
//   RIGHT PANE RESIZE
// ═══════════════════════════════════════════

const rightPane = document.getElementById('right-pane');
const rightResizeHandle = document.getElementById('right-resize-handle');
const WIDE_THRESHOLD = 480;

function updateLayout() {
  rightPane.classList.toggle('wide', rightPane.offsetWidth >= WIDE_THRESHOLD);
}

let _resizing = false, _resizeStartX = 0, _resizeStartW = 0;

rightResizeHandle.addEventListener('mousedown', (e) => {
  _resizing = true;
  _resizeStartX = e.clientX;
  _resizeStartW = rightPane.offsetWidth;
  rightResizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!_resizing) return;
  const dx = _resizeStartX - e.clientX; // drag left = wider
  const newW = Math.max(220, _resizeStartW + dx);
  rightPane.style.width = newW + 'px';
  updateLayout();
});

document.addEventListener('mouseup', () => {
  if (!_resizing) return;
  _resizing = false;
  rightResizeHandle.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  localStorage.setItem('pane-width', rightPane.offsetWidth);
});

// ═══════════════════════════════════════════
//   INIT
// ═══════════════════════════════════════════

const savedPaneWidth = localStorage.getItem('pane-width');
if (savedPaneWidth) rightPane.style.width = savedPaneWidth + 'px';
applyFontSize();
document.getElementById('shader-code').value = EXAMPLES.circle;
updateLayout();
runShader();
</script>
</body>
</html>
