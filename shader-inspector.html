<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLSL Pixel Inspector</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --surface2: #161625;
    --border: #252538;
    --accent: #e8a020;
    --accent2: #30b8f0;
    --green: #40e080;
    --red: #f04050;
    --text: #c8c8dc;
    --muted: #5a5a78;
    --dim: #888899;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
    --ui-fs: 12.5px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

  #app {
    display: grid;
    grid-template-rows: 44px 1fr;
    grid-template-columns: 1fr auto;
    height: 100vh;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 1.04);
    color: var(--accent);
    letter-spacing: 0.05em;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '◈';
    font-size: calc(var(--ui-fs) * 1.28);
  }
  .header-sep { flex: 1; }
  .example-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
  }
  .example-select:hover { border-color: var(--accent); }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #ffc040; }
  .btn.active { border-color: var(--green); color: var(--green); }
  #render-time { font-family: var(--mono); font-size: calc(var(--ui-fs) * 0.88); color: var(--muted); min-width: 70px; text-align: right; }
  .font-btn { padding: 5px 8px; min-width: 30px; justify-content: center; }
  #resolution-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
  }

  /* ── EDITOR ── */
  #editor-panel {
    grid-row: 2;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .panel-label {
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.8);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 14px 6px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #shader-code {
    flex: 1;
    resize: none;
    background: var(--bg);
    color: #a0e0c0;
    font-family: var(--mono);
    font-size: var(--ui-fs);
    line-height: 1.7;
    border: none;
    outline: none;
    padding: 14px 16px;
    overflow-y: auto;
    tab-size: 2;
    caret-color: var(--accent);
  }
  .error-bar {
    background: rgba(240, 64, 80, 0.12);
    border-top: 1px solid rgba(240, 64, 80, 0.4);
    color: var(--red);
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    padding: 6px 14px;
    min-height: 32px;
    display: none;
  }
  .error-bar.visible { display: block; }

  /* ── RIGHT PANE ── */
  #right-pane {
    grid-row: 2;
    grid-column: 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    width: 320px;
    min-width: 220px;
    flex-shrink: 0;
    position: relative;
  }
  #right-pane.wide {
    flex-direction: row;
  }
  #right-resize-handle {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    cursor: col-resize;
    z-index: 20;
    background: transparent;
    transition: background 0.15s;
  }
  #right-resize-handle:hover, #right-resize-handle.dragging {
    background: rgba(232, 160, 32, 0.4);
  }

  /* ── CANVAS PANEL ── */
  #canvas-panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  #right-pane.wide #canvas-panel {
    border-bottom: none;
    border-right: 1px solid var(--border);
    height: 100%;
  }
  #canvas-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background:
      repeating-linear-gradient(45deg, #111118 0px, #111118 4px, transparent 4px, transparent 8px),
      repeating-linear-gradient(-45deg, #111118 0px, #111118 4px, transparent 4px, transparent 8px);
    background-color: #0a0a12;
    padding: 8px;
  }
  /* in wide/row mode, canvas-wrap must fill the panel height */
  #right-pane.wide #canvas-wrap {
    flex: 1;
    padding: 8px;
  }
  #canvas {
    cursor: crosshair;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid var(--border);
    max-width: 100%;
    max-height: 100%;
    outline: none;
  }
  #canvas:focus {
    border-color: var(--accent);
  }
  #crosshair {
    position: absolute;
    pointer-events: none;
    display: none;
  }
  #crosshair .ch-h, #crosshair .ch-v {
    position: absolute;
    background: rgba(248, 160, 32, 0.7);
  }
  #crosshair .ch-h { height: 1px; width: 100vw; top: 50%; left: -500px; transform: translateY(-50%); }
  #crosshair .ch-v { width: 1px; height: 100vh; left: 50%; top: -500px; transform: translateX(-50%); }

  /* ── INSPECTOR ── */
  #inspector-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex: 1;
    min-width: 200px;
  }
  #inspector-content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: calc(var(--ui-fs) * 0.88);
    line-height: 1.6;
  }
  .insp-empty {
    color: var(--muted);
    font-style: italic;
    padding: 8px 0;
    font-family: var(--sans);
    font-size: calc(var(--ui-fs) * 0.96);
  }
  .insp-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .insp-label {
    color: var(--accent);
    min-width: 110px;
    flex-shrink: 0;
  }
  .insp-value { color: var(--accent2); }
  .insp-value.vec { color: #90d8a0; }
  .insp-value.float { color: #f0d080; }
  .insp-value.color-swatch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .swatch {
    width: 18px;
    height: 18px;
    border-radius: 3px;
    border: 1px solid var(--border);
    display: inline-block;
    flex-shrink: 0;
    vertical-align: middle;
  }
  .insp-section {
    color: var(--muted);
    font-size: calc(var(--ui-fs) * 0.8);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin: 8px 0 4px;
  }
  .insp-debug { color: #c080f0; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">GLSL Pixel Inspector</div>
    <select class="example-select" id="example-select">
      <option value="">— load example —</option>
      <option value="uv">UV Coordinates</option>
      <option value="circle">SDF Circle</option>
      <option value="stripes">Stripes & Smoothstep</option>
      <option value="plasma">Plasma Wave</option>
      <option value="checkerboard">Checkerboard</option>
      <option value="gradient">Radial Gradient</option>
      <option value="normals">Normal Map Look</option>
    </select>
    <div class="header-sep"></div>
    <select id="resolution-select">
      <option value="64">64 × 64</option>
      <option value="128" selected>128 × 128</option>
      <option value="256">256 × 256</option>
    </select>
    <button class="btn font-btn" id="font-dec" title="Decrease font size">A−</button>
    <button class="btn font-btn" id="font-inc" title="Increase font size">A+</button>
    <button class="btn" id="anim-btn">▶ Animate</button>
    <button class="btn primary" id="run-btn">⌘ Run</button>
    <div id="render-time">—</div>
  </header>

  <div id="editor-panel">
    <div class="panel-label">Fragment Shader · GLSL / Shadertoy</div>
    <textarea id="shader-code" spellcheck="false"></textarea>
    <div class="error-bar" id="error-bar"></div>
  </div>

  <div id="right-pane">
    <div id="right-resize-handle"></div>

    <div id="canvas-panel">
      <div class="panel-label" id="canvas-label">Preview · 128 × 128</div>
      <div id="canvas-wrap">
        <canvas id="canvas" tabindex="0"></canvas>
        <div id="crosshair"><div class="ch-h"></div><div class="ch-v"></div></div>
      </div>
    </div>

    <div id="inspector-panel">
      <div class="panel-label">Pixel Inspector · click any pixel</div>
      <div id="inspector-content">
        <div class="insp-empty">Click a pixel to inspect its values.</div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
